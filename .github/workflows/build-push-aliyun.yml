name: Open Design 镜像构建

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: open-design-build
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ${{ vars.REGISTRY || 'crpi-xxxxx.cn-shanghai.personal.cr.aliyuncs.com' }}
  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE || 'ck-registry' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 安装 Buildx（走国内镜像）
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=docker.m.daocloud.io/moby/buildkit:buildx-stable-1

      - name: 登录阿里云 ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/Dockerfile
          pull: true
          push: true
          build-args: |
            NODE_IMAGE=docker.m.daocloud.io/library/node:24-alpine
            RUNTIME_IMAGE=docker.m.daocloud.io/library/node:24-alpine
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/open-design:${GITHUB_SHA}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/open-design:latest
          cache-from: type=gha,scope=open-design
          cache-to: type=gha,mode=max,scope=open-design
